name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# GITHUB_TOKEN を最小権限に絞る（CI はチェックアウトと検査のみで書き込み不要）。
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash syntax check
        run: bash -n bin/booch install.sh lib/*.sh jobs/*.sh vendor/update.sh examples/*.sh tests/*.sh

      # shellcheck は ubuntu-latest ランナーにプリインストールされている。
      - name: shellcheck
        run: shellcheck -x bin/booch install.sh lib/*.sh jobs/*.sh vendor/update.sh examples/*.sh tests/*.sh

      - name: unit tests
        run: bash tests/run.sh

      # smoke は失敗ジョブ・timeout を含むため exit 1 が正しい挙動。
      # その exit 1 を期待結果として検証する（クラッシュとは区別する）。
      - name: runner smoke
        run: |
          if out=$(bash tests/smoke.sh 2>&1); then rc=0; else rc=$?; fi
          printf '%s\n' "$out"
          test "$rc" -eq 1
          printf '%s\n' "$out" | grep -q "Tool Summary"
