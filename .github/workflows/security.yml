# ShellCheck の結果を SARIF で Code scanning（Security タブ）へ連携する。
# CodeQL は Bash を直接サポートしないため、CI（ci.yml）で既にゲートしている ShellCheck を
# Security タブにも上げて可視化する。失敗ゲートは ci.yml 側の `shellcheck -x`（全ファイル）が
# 担い、本ワークフローは push 時にフルスキャンして SARIF を上げ、新規欠陥のみで失敗する。
name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  shellcheck-sarif:
    name: ShellCheck (SARIF -> Code scanning)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # push ではフル、pull_request では差分をスキャンし、SARIF を Code scanning へ
      # アップロードする。external-sources は既定 true（ci.yml の `-x` と整合）。
      - name: Differential ShellCheck
        uses: redhat-plumbers-in-action/differential-shellcheck@v5
        with:
          severity: style
          token: ${{ secrets.GITHUB_TOKEN }}
